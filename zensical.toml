[project]
site_name = "stac-utils"
site_description = "Tools for working with SpatioTemporal Asset Catalogs (STAC)"
site_author = "Pete Gadomski"
site_url = "https://stac-utils.github.io"
repo_url = "https://github.com/stac-utils/stac-utils.github.io"
copyright = """
Copyright &copy; 2026 The STAC PSC
"""

[project.theme]
favicon = "stac-utils.png"
language = "en"
features = [
    "announce.dismiss",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.integrate",
]

logo = "stac-utils.png"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
